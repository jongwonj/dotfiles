# ~/.config/yazi/yazi.toml

[mgr]
ratio = [1, 4, 3]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
linemode = "mtime"
show_hidden = true
show_ignored = false
show_symlink = true
mouse_events = ["click", "scroll", "touch", "move", "drag"]

[opener]
play = [{ run = 'smplayer "$@"', orphan = true, for = "unix" }]
edit = [{ run = '$EDITOR "$@"', block = true, for = "unix" }]
open = [{ run = 'f "$@"', desc = "Open" }]
